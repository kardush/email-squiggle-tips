name: AFL AI prediction Tips – Winner Change Alert

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours

jobs:
  changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Squiggle tips
        run: |
          curl -s -H "User-Agent: github-actions" \
            "https://api.squiggle.com.au/?q=tips;year=2026;source=1;format=json" \
            > tips.json

      - name: Build future winner state
        run: |
          TODAY=$(date -u +"%Y-%m-%d")

          jq -r --arg today "$TODAY" '
            .tips
            | map(select(.date[0:10] >= $today))
            | sort_by(.gameid)
            | map({
                gameid,
                round,
                hteam,
                ateam,
                tip
              })
          ' tips.json > current.json

      - name: Detect winner changes
        id: diff
        run: |
          if [ ! -f last.json ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          jq -s '
            (.[0] | INDEX(.gameid)) as $old
            | .[1][]
            | select($old[.gameid].tip != .tip)
            | {
                round,
                hteam,
                ateam,
                old: $old[.gameid].tip,
                new: .tip
              }
          ' last.json current.json > changes.json

          if [ -s changes.json ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build change email
        if: steps.diff.outputs.changed == 'true'
        run: |
          jq -r '
            group_by(.round)
            | map(
                "<h3>Round \(.[0].round)</h3><ul>"
                + (
                    map(
                      "<li><b>\(.hteam) vs \(.ateam)</b><br/>Winner changed: <b>\(.old)</b> → <b>\(.new)</b></li>"
                    )
                    | join("")
                  )
                + "</ul>"
              )
            | join("")
          ' changes.json > body.html

      - name: Load HTML body
        if: steps.diff.outputs.changed == 'true'
        run: |
          {
            echo "EMAIL_HTML<<EOF"
            cat body.html
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Send change alert
        if: steps.diff.outputs.changed == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASS }}
          subject: "AFL AI prediction Tips – Winner Changed"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          html_body: ${{ env.EMAIL_HTML }}

      - name: Persist state
        if: steps.diff.outputs.changed == 'true'
        run: |
          mv current.json last.json
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last.json
          git commit -m "Update winner state"
          git push

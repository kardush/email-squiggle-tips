name: Squiggle Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Squiggle tips
        run: |
          curl -s -H "User-Agent: github-actions" \
            "https://api.squiggle.com.au/?q=tips;year=2026;source=1;format=json" \
            > tips.json

      - name: Format tips by round
        run: |
          jq -r '
            .tips
            | sort_by(.round, .date)
            | group_by(.round)
            | map(
                "ROUND \(. [0].round)\n"
                + (
                    map(
                      "\(.tip) by \(.margin|tonumber|abs|round) (\(.confidence)%) – \(.hteam) vs \(.ateam)"
                    )
                    | join("\n")
                  )
              )
            | join("\n\n")
          ' tips.json > body.txt

      - name: Load email body safely
        run: |
          {
            echo "EMAIL_BODY<<EOF"
            cat body.txt
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Send Squiggle tips email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASS }}
          subject: "AFL Squiggle Tips – All Rounds"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          body: ${{ env.EMAIL_BODY }}

name: Squiggle Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Squiggle tips
        id: squiggle
        run: |
          curl -s -H "User-Agent: github-actions" \
            "https://api.squiggle.com.au/?q=tips;year=2026;source=1;format=json" \
            > tips.json

      - name: Create GitHub Issue with tips
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const fs = require('fs');
            const tips = fs.readFileSync('tips.json', 'utf8');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Squiggle tips update ${new Date().toISOString()}`,
              body: tips
            });
